pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{js,ts,vue,css,json,md}"
      run: npx prettier --check {staged_files}
    eslint:
      glob: "*.{js,ts,vue}"
      run: npx eslint {staged_files}
    cargo-fmt:
      glob: "*.rs"
      run: cargo fmt --check
      root: "src-tauri"
    cargo-clippy:
      glob: "*.rs"
      run: cargo clippy -- -D warnings
      root: "src-tauri"

commit-msg:
  commands:
    commitlint:
      run: echo "Commit message: {1}"
